<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak 🌙</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to top, #000000, #020617);
  color: white;
}

/* 🌌 Soft stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
}

/* 🌙 Crescent */
.moon {
  position: absolute;
  top: 18%;
  left: 50%;
  width: 110px;
  height: 110px;
  background: #f5f3ce;
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255, 248, 180, 0.6);
  transform: translateX(-50%);
}

.moon::after {
  content: "";
  position: absolute;
  top: 0;
  left: 35px;
  width: 110px;
  height: 110px;
  background: #020617;
  border-radius: 50%;
}

/* 🕌 Minimal skyline */
.skyline {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to top, #000, transparent);
}

/* ✨ Center text */
#text {
  position: absolute;
  top: 52%;
  width: 100%;
  text-align: center;
  font-size: 2.8em;
  letter-spacing: 2px;
  color: #facc15;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 2s ease forwards;
  animation-delay: 1s;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💫 floating dots */
.dot {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #facc15;
  border-radius: 50%;
  opacity: 0.5;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 0.6; }
  to { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<div class="moon"></div>
<div class="skyline"></div>

<h1 id="text">Eid Mubarak 🌙</h1>

<script>
/* 🌌 stars */
for (let i = 0; i < 100; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random() * window.innerHeight + "px";
  s.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(s);
}

/* 💫 floating particles */
setInterval(() => {
  let d = document.createElement("div");
  d.className = "dot";
  d.style.left = Math.random() * window.innerWidth + "px";
  d.style.top = window.innerHeight + "px";
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 6000);
}, 300);

/* 🔤 personalized */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if (name) {
  document.getElementById("text").innerText =
    `Eid Mubarak, ${name}`;
}
</script>

</body>
</html>
