<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak 🌙</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at bottom, #000000, #020111 70%, #000000);
  color: white;
  text-align: center;
}

/* 🌌 Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* 🌠 Shooting star */
.shooting {
  position: absolute;
  width: 2px;
  height: 80px;
  background: linear-gradient(white, transparent);
  transform: rotate(45deg);
  opacity: 0.8;
  animation: shoot 1s linear forwards;
}

@keyframes shoot {
  to {
    transform: translate(300px, 300px) rotate(45deg);
    opacity: 0;
  }
}

/* 🌙 Moon */
.moon {
  position: absolute;
  top: 12%;
  left: 50%;
  width: 130px;
  height: 130px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 100px #fff;
  transform: translateX(-50%);
  animation: floatMoon 6s ease-in-out infinite alternate;
}

.moon::after {
  content: "";
  position: absolute;
  top: 0;
  left: 45px;
  width: 130px;
  height: 130px;
  background: #000;
  border-radius: 50%;
}

@keyframes floatMoon {
  from { transform: translate(-50%, 0); }
  to { transform: translate(-50%, 25px); }
}

/* 🕌 Mosque SVG */
.mosque {
  position: absolute;
  bottom: 0;
  width: 100%;
}

/* ✨ Text */
#text {
  position: absolute;
  top: 55%;
  width: 100%;
  font-size: 3em;
  opacity: 0;
  transform: scale(0.6);
  animation: appear 3s ease forwards;
  animation-delay: 2s;
  color: gold;
  text-shadow:
    0 0 10px gold,
    0 0 20px orange,
    0 0 40px gold;
}

@keyframes appear {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* 💫 Sparkles */
.sparkle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: gold;
  border-radius: 50%;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-700px); opacity: 0; }
}

/* 🎆 Fireworks (gold) */
.firework {
  position: absolute;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="moon"></div>

<!-- 🕌 Simple Mosque SVG -->
<svg class="mosque" viewBox="0 0 1440 320">
  <path fill="black" d="M0,224L60,208C120,192,240,160,360,165.3C480,171,600,213,720,224C840,235,960,213,1080,197.3C1200,181,1320,171,1380,165.3L1440,160L1440,320L0,320Z"></path>
</svg>

<h1 id="text">Eid Mubarak 🌙</h1>

<audio id="bgm" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" loop></audio>

<script>
/* ⭐ Stars */
for (let i = 0; i < 150; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(star);
}

/* 🌠 Shooting stars */
setInterval(() => {
  let s = document.createElement("div");
  s.className = "shooting";
  s.style.top = Math.random() * 200 + "px";
  s.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}, 3000);

/* 💫 Sparkles */
setInterval(() => {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * window.innerWidth + "px";
  s.style.top = window.innerHeight + "px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 6000);
}, 200);

/* 🎆 Fireworks */
setInterval(() => {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight / 2;

  for (let i = 0; i < 25; i++) {
    let f = document.createElement("div");
    f.className = "firework";

    f.style.left = x + "px";
    f.style.top = y + "px";
    f.style.setProperty('--x', (Math.random() - 0.5) * 300 + "px");
    f.style.setProperty('--y', (Math.random() - 0.5) * 300 + "px");

    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }
}, 2000);

/* 🔤 Personalized name */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if (name) {
  document.getElementById("text").innerText =
    `Eid Mubarak, ${name} 🌙`;
}

/* 🎵 Play sound on first click */
document.addEventListener("click", () => {
  document.getElementById("bgm").play();
}, { once: true });
</script>

</body>
</html>
