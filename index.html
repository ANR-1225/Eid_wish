<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak 🌙</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000000;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* 🌌 Stars */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  opacity: 0.8;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* 🌙 Crescent Moon */
.moon {
  position: absolute;
  top: 18%;
  left: 50%;
  width: 110px;
  height: 110px;
  background: #f8f3d6;
  border-radius: 50%;
  box-shadow: 0 0 60px rgba(255, 244, 180, 0.4);
  transform: translateX(-50%);
}

.moon::after {
  content: "";
  position: absolute;
  top: 0;
  left: 35px;
  width: 110px;
  height: 110px;
  background: #000;
  border-radius: 50%;
}

/* ✨ Text */
#text {
  position: absolute;
  top: 55%;
  width: 100%;
  text-align: center;
  font-size: 2.8em;
  letter-spacing: 3px;
  color: #facc15;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 2s ease forwards;
  animation-delay: 1s;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💫 subtle floating glow */
.glow {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #facc15;
  border-radius: 50%;
  opacity: 0.4;
  animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 0.5; }
  to { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<div class="moon"></div>
<h1 id="text">Eid Mubarak 🌙</h1>

<script>
/* 🌌 Create stars */
for (let i = 0; i < 120; i++) {
  let star = document.createElement("div");
  star.className = "star";

  let size = Math.random() * 2 + 1;
  star.style.width = size + "px";
  star.style.height = size + "px";

  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.left = Math.random() * window.innerWidth + "px";

  document.body.appendChild(star);
}

/* 💫 subtle glow particles */
setInterval(() => {
  let g = document.createElement("div");
  g.className = "glow";

  g.style.left = Math.random() * window.innerWidth + "px";
  g.style.top = window.innerHeight + "px";

  document.body.appendChild(g);

  setTimeout(() => g.remove(), 8000);
}, 400);

/* 🔤 Personal name */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if (name) {
  document.getElementById("text").innerText =
    `Eid Mubarak, ${name} 🌙`;
}
</script>

</body>
</html>
