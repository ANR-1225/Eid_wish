<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak 🌙</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at bottom, #000010, #000000);
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* 🌌 Stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* 🌙 Crescent Moon */
.moon {
  position: absolute;
  top: 15%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 80px white;
  transform: translateX(-50%);
  animation: floatMoon 6s ease-in-out infinite alternate;
}

.moon::after {
  content: "";
  position: absolute;
  top: 0;
  left: 40px;
  width: 120px;
  height: 120px;
  background: #000;
  border-radius: 50%;
}

@keyframes floatMoon {
  from { transform: translate(-50%, 0); }
  to { transform: translate(-50%, 20px); }
}

/* 🕌 Ground fade */
.mosque {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: linear-gradient(to top, black, transparent);
}

/* ✨ Text */
#text {
  position: absolute;
  top: 55%;
  width: 100%;
  font-size: 2.8em;
  opacity: 0;
  transform: scale(0.5);
  animation: appear 3s ease forwards;
  animation-delay: 2s;
  text-shadow:
    0 0 10px #00c3ff,
    0 0 20px #00c3ff,
    0 0 40px #00c3ff;
}

@keyframes appear {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* 💫 Sparkles */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-600px); opacity: 0; }
}

/* 🎆 Fireworks */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="moon"></div>
<div class="mosque"></div>
<h1 id="text">Eid Mubarak 🌙</h1>

<script>
/* ⭐ Stars */
for (let i = 0; i < 120; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(star);
}

/* 💫 Sparkles */
setInterval(() => {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * window.innerWidth + "px";
  s.style.top = window.innerHeight + "px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 5000);
}, 200);

/* 🎆 Auto Fireworks */
setInterval(() => {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight / 2;

  for (let i = 0; i < 25; i++) {
    let f = document.createElement("div");
    f.className = "firework";

    f.style.left = x + "px";
    f.style.top = y + "px";
    f.style.setProperty('--x', (Math.random() - 0.5) * 250 + "px");
    f.style.setProperty('--y', (Math.random() - 0.5) * 250 + "px");

    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }
}, 2000);

/* 🔤 Personalized Name */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if (name) {
  document.getElementById("text").innerText =
    `Eid Mubarak, ${name} 🌙`;
}
</script>

</body>
</html>
